publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
overrides:
  normalize-package-data: ^9.0.0
allowBuilds:
  esbuild: true
  keytar-forked: true
  oxc-resolver: true
  unrs-resolver: true
  rollup: false
