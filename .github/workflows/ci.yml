name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup macOS Keychain for tests
        run: |
          set -euo pipefail

          KEYCHAIN_NAME="ci-test.keychain-db"
          KEYCHAIN_PASSWORD="ci-test-password"

          # Remove any leftover keychain from a previous run
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true

          # Create and configure the temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Allow non-interactive access (critical for CI)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Add the temporary keychain to the search list (prepend it)
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security list-keychains -d user -s "$KEYCHAIN_NAME" $EXISTING_KEYCHAINS
          security default-keychain -s "$KEYCHAIN_NAME"

          # Verify the keychain is accessible
          echo "Keychain search list:"
          security list-keychains -d user
          echo "Default keychain:"
          security default-keychain

      - name: Ensure LaunchAgents directory exists
        run: mkdir -p ~/Library/LaunchAgents

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Cleanup macOS Keychain
        if: always()
        run: |
          KEYCHAIN_NAME="ci-test.keychain-db"
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
